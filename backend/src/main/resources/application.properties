# ===============================================
# HTTP
# ===============================================
quarkus.http.port=8080
quarkus.http.root-path=/

# Trust forwarded headers from configured proxies only (api-security 12.5)
quarkus.http.proxy.proxy-address-forwarding=true
quarkus.http.proxy.allow-forwarded=true
quarkus.http.proxy.enable-forwarded-host=true
quarkus.http.proxy.enable-forwarded-prefix=true
# Comma-separated list of trusted proxy CIDRs (e.g. 10.0.0.0/8). Empty in dev.
quarkus.http.proxy.trusted-proxies=${APP_TRUSTED_PROXIES:}

# ===============================================
# CORS (api-security 12.1, 12.2)
# ===============================================
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${APP_CORS_ORIGINS:http://localhost:5173}
quarkus.http.cors.methods=${APP_CORS_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
quarkus.http.cors.headers=${APP_CORS_HEADERS:Authorization,Content-Type}
quarkus.http.cors.access-control-max-age=${APP_CORS_MAX_AGE:3600}
quarkus.http.cors.access-control-allow-credentials=false

# ===============================================
# Datasource
# Base config does NOT set jdbc.url — each profile (dev, prod, test) provides
# its own.  This lets the test profile rely on Dev Services / Testcontainers
# without the base URL silently winning.
# ===============================================
quarkus.datasource.db-kind=postgresql

# ===============================================
# Hibernate ORM
# ===============================================
quarkus.hibernate-orm.database.generation=validate
quarkus.hibernate-orm.log.sql=false

# ===============================================
# Flyway
# ===============================================
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration
quarkus.flyway.baseline-on-migrate=true

# ===============================================
# Auth0 / OIDC
# ===============================================
quarkus.oidc.auth-server-url=https://${AUTH0_DOMAIN:example.auth0.com}/
quarkus.oidc.application-type=service
quarkus.oidc.token.audience=${AUTH0_AUDIENCE:https://api.example.com}

# Auth defaults: deny by default, then carve out exceptions on resource methods.
quarkus.http.auth.proactive=true
quarkus.http.auth.permission.public-health.paths=/api/health,/q/health,/q/health/live,/q/health/ready,/q/openapi,/q/openapi/*,/q/swagger-ui,/q/swagger-ui/*
quarkus.http.auth.permission.public-health.policy=permit
quarkus.http.auth.permission.public-health.methods=GET,OPTIONS
quarkus.http.auth.permission.api.paths=/api/*
quarkus.http.auth.permission.api.policy=authenticated

# ===============================================
# Health (api-security 12.6)
# Quarkus SmallRye Health defaults already produce:
#   /q/health, /q/health/live, /q/health/ready
# so no path overrides are needed here.
# ===============================================
quarkus.smallrye-health.ui.always-include=false

# ===============================================
# OpenAPI / Swagger
# ===============================================
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui

# ===============================================
# DEV profile (2.3)
# ===============================================
%dev.quarkus.datasource.username=todoapp
%dev.quarkus.datasource.password=todoapp
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/todoapp
%dev.quarkus.hibernate-orm.log.sql=true
# In dev the OIDC server may not be reachable; skip startup validation but
# still validate tokens lazily when an auth request actually arrives.
%dev.quarkus.oidc.connection-delay=5S
%dev.quarkus.oidc.tenant-enabled=true

# ===============================================
# TEST profile — Testcontainers Postgres via JDBC URL scheme
# ===============================================
%test.quarkus.datasource.devservices.enabled=false
%test.quarkus.datasource.active=true
%test.quarkus.datasource.username=test
%test.quarkus.datasource.password=test
%test.quarkus.datasource.jdbc.url=jdbc:tc:postgresql:16:///todoapp
%test.quarkus.datasource.jdbc.driver=org.testcontainers.jdbc.ContainerDatabaseDriver
%test.quarkus.flyway.migrate-at-start=true
%test.quarkus.flyway.clean-at-start=true
%test.quarkus.flyway.clean-disabled=false
%test.quarkus.oidc.tenant-enabled=false
%test.quarkus.http.auth.permission.api.policy=permit
%test.quarkus.http.auth.permission.public-health.policy=permit
