apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend
  labels:
    app.kubernetes.io/name: todo-backend
    app.kubernetes.io/part-of: todo-app
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: todo-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: todo-backend
        app.kubernetes.io/part-of: todo-app
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: todo-backend
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: todo-backend:placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: QUARKUS_HTTP_PORT
              value: "8080"
            - name: QUARKUS_HTTP_HOST
              value: "0.0.0.0"
            - name: QUARKUS_DATASOURCE_JDBC_URL
              valueFrom:
                secretKeyRef: { name: todo-backend-secrets, key: db-jdbc-url }
            - name: QUARKUS_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef: { name: todo-backend-secrets, key: db-username }
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef: { name: todo-backend-secrets, key: db-password }
            - name: QUARKUS_OIDC_AUTH_SERVER_URL
              valueFrom:
                secretKeyRef: { name: todo-backend-secrets, key: oidc-issuer }
            - name: QUARKUS_OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef: { name: todo-backend-secrets, key: oidc-audience }
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1024Mi"
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /q/health/started
              port: http
            failureThreshold: 30
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: app-secrets
              mountPath: /mnt/secrets-store
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: app-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: todo-backend-secrets
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: todo-backend
  annotations:
    azure.workload.identity/client-id: PLACEHOLDER
  labels:
    azure.workload.identity/use: "true"
