# Azure Key Vault CSI driver binding. Concrete keyvaultName, clientID, and
# tenantId are filled in by each overlay's patch.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: todo-backend-secrets
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "PLACEHOLDER"
    keyvaultName: "PLACEHOLDER"
    tenantId: "PLACEHOLDER"
    objects: |
      array:
        - |
          objectName: db-jdbc-url
          objectType: secret
        - |
          objectName: db-username
          objectType: secret
        - |
          objectName: db-password
          objectType: secret
        - |
          objectName: oidc-issuer
          objectType: secret
        - |
          objectName: oidc-audience
          objectType: secret
  secretObjects:
    - secretName: todo-backend-secrets
      type: Opaque
      data:
        - objectName: db-jdbc-url
          key: db-jdbc-url
        - objectName: db-username
          key: db-username
        - objectName: db-password
          key: db-password
        - objectName: oidc-issuer
          key: oidc-issuer
        - objectName: oidc-audience
          key: oidc-audience
