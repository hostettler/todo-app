server {
    listen       8080 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Security headers (mirrors backend baseline defined in root README)
    add_header X-Content-Type-Options       "nosniff" always;
    add_header X-Frame-Options              "DENY"    always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security    "max-age=63072000; includeSubDomains" always;
    add_header Content-Security-Policy      "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'" always;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/javascript application/json application/xml application/xml+rss
        font/eot font/otf font/ttf image/svg+xml text/css text/javascript text/plain text/xml;

    # Runtime app configuration; populated by Kubernetes ConfigMap volume mount.
    location = /config.json {
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    # Liveness/readiness probe target — cheap and dependency-free.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Long-cache hashed assets emitted by Vite.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # SPA fallback — every unknown path returns index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
